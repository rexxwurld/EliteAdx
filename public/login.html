<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteAdx — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E14;
    --surface:#12171F;
    --border:#232B36;
    --border-soft:#1A212B;
    --text:#E8EAED;
    --muted:#8B95A1;
    --dim:#5B6572;
    --gold:#C9A24A;
    --gold-soft:rgba(201,162,74,0.12);
    --red:#EF4444;
    --red-soft:rgba(239,68,68,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:380px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px;
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
  .brand-mark{
    width:36px;height:36px;border-radius:8px;
    background:linear-gradient(135deg,var(--gold),#8a6d2f);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;color:#0A0E14;font-size:17px;
    font-family:'Space Grotesk',sans-serif;
  }
  .brand-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;}
  .brand-tag{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;}

  h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:24px;}

  label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;}
  input{
    width:100%;background:var(--border-soft);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:11px 12px;font-size:13.5px;
    font-family:'Inter',sans-serif;margin-bottom:16px;
  }
  input:focus{outline:none;border-color:var(--gold);}

  button{
    width:100%;background:var(--gold);color:#0A0E14;border:none;
    padding:12px;border-radius:9px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;
  }
  button:hover{filter:brightness(1.08);}
  button:disabled{opacity:0.6;cursor:not-allowed;}

  .error{
    display:none;background:var(--red-soft);color:var(--red);
    border:1px solid rgba(239,68,68,0.3);border-radius:8px;
    padding:10px 12px;font-size:12.5px;margin-bottom:16px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-mark">E</div>
    <div>
      <div class="brand-name">EliteAdx</div>
      <div class="brand-tag">Control Room</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <div class="sub">Access your advertising dashboard</div>

  <div class="error" id="errorBox"></div>

  <form id="authForm">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required>

    <button type="submit" id="submitBtn">Sign in</button>
  </form>
</div>
<script src="login.js"></script>
</body>
</html>
